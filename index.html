<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household Sector Balance Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col p-4 items-center">
    <div class="flex-1 flex flex-col min-h-0 items-center w-full">

        <!-- Slider -->
        <div class="bg-white rounded-lg shadow-sm p-4 mb-3 mx-auto" style="max-width: 1500px; width: 100%;">
            <div class="flex items-center gap-4">
                <label for="quarterSlider" class="text-sm font-medium text-gray-700 whitespace-nowrap">Quarter:</label>
                <input type="range" id="quarterSlider" min="0" max="0" value="0"
                    oninput="plot_sankey_from_slider()"
                    class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                <span id="quarterLabel" class="text-sm font-medium text-gray-700 min-w-[80px] text-right">Loading...</span>
                <div class="flex items-center gap-3 ml-4 pl-4 border-l border-gray-200 text-sm text-gray-600">
                    <label class="flex items-center gap-1 cursor-pointer">
                        <input type="radio" name="sankeyMode" value="person" checked onchange="plot_sankey()">
                        Per person
                    </label>
                    <label class="flex items-center gap-1 cursor-pointer">
                        <input type="radio" name="sankeyMode" value="household" onchange="plot_sankey()">
                        Per household
                    </label>
                </div>
            </div>
        </div>

        <!-- Charts row -->
        <div class="flex gap-4 flex-1 min-h-0 mx-auto" style="max-width: 1500px; max-height: 760px; width: 100%;">

            <!-- Sankey (left, 80%) -->
            <div class="bg-white rounded-lg shadow-sm p-4" style="width: 80%;">
                <div id="sankeyPlot" class="w-full h-full"></div>
            </div>

            <!-- Right panel (20%) — stats+trend on top, pie on bottom -->
            <div class="flex flex-col gap-3" style="width: 20%;">
                <div class="bg-white rounded-lg shadow-sm p-3 flex flex-col" style="flex: 1; min-height: 0;">
                    <div id="currentStats" class="text-xs text-gray-700 mb-2 shrink-0"></div>
                    <div id="statsChart" style="flex: 1; min-height: 0;"></div>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-2" style="height: 42%;">
                    <div id="pieChart" class="w-full h-full"></div>
                </div>
            </div>
        </div>

        <div class="mt-2 text-xs text-gray-500 text-center" style="max-width: 1500px; width: 100%;">
            Data: <a href="https://data.gov.sg/datasets/d_c14a14d2f870e909268a9be5970e7d87/view" target="_blank" class="text-blue-600 hover:underline">Household Sector Balance Sheet</a>
            &nbsp;·&nbsp;
            <a href="https://data.gov.sg/datasets/d_2bc812dbfd1e485638435fcdf7aac196/view" target="_blank" class="text-blue-600 hover:underline">Resident Households by Size</a>
            &nbsp;·&nbsp;
            <a href="https://data.gov.sg/datasets/d_bdaff844e3ef89d39fceb962ff8f0791/view" target="_blank" class="text-blue-600 hover:underline">Consumer Price Index</a>
            &nbsp;— SingStat / data.gov.sg
        </div>
    </div>

    <script>
        var all_data = {};        // {'20253Q': {'Net Worth': 12345_M, ...}, ...}
        var all_quarters = [];
        var current_labels = [];
        var households_data = {}; // {year: {households: N, avgSize: X}}
        var cpi_data = {};        // {year: cpiValue} annual (Dec or latest month)
        var cpi_ref_year = null;  // latest year with CPI data
        var cpi_ref = null;       // CPI value of that year

        // ── Formatting ───────────────────────────────────────────────────────

        function formatQuarter(q) {
            return `${q.substring(0, 4)} Q${q.substring(4).replace('Q', '')}`;
        }

        function formatMillion(m) {
            if (m >= 1e6) return `S$${(m / 1e6).toFixed(2)}T`;
            if (m >= 1e3) return `S$${(m / 1e3).toFixed(1)}B`;
            return `S$${m.toFixed(0)}M`;
        }

        function formatDollars(v) {
            if (v >= 1e6) return `S$${(v / 1e6).toFixed(2)}M`;
            if (v >= 1e3) return `S$${(v / 1e3).toFixed(1)}k`;
            return `S$${v.toFixed(0)}`;
        }

        // ── CPI data ─────────────────────────────────────────────────────────

        function parse_cpi_data(incoming_data) {
            const records = incoming_data.result.records;
            const allItemsRow = records.find(r => r['DataSeries'].trim() === 'All Items');
            if (!allItemsRow) return {};

            const monthOrder = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const byYear = {};

            for (const [key, value] of Object.entries(allItemsRow)) {
                if (key === '_id' || key === 'DataSeries') continue;
                const m = key.match(/^(\d{4})([A-Za-z]{3})$/);
                if (!m) continue;
                const year = parseInt(m[1]);
                if (!byYear[year]) byYear[year] = {};
                byYear[year][m[2]] = parseFloat(value);
            }

            const result = {};
            for (const [year, months] of Object.entries(byYear)) {
                // Prefer December; otherwise take the last available month
                if (months['Dec'] !== undefined) {
                    result[parseInt(year)] = months['Dec'];
                } else {
                    let latest = null;
                    for (const mo of monthOrder) {
                        if (months[mo] !== undefined) latest = months[mo];
                    }
                    if (latest !== null) result[parseInt(year)] = latest;
                }
            }
            return result;
        }

        function get_cpi(year) {
            // Nearest year <= given year
            if (cpi_data[year] !== undefined) return cpi_data[year];
            const years = Object.keys(cpi_data).map(Number).sort((a, b) => a - b);
            let best = null;
            for (const y of years) { if (y <= year) best = y; }
            return best !== null ? cpi_data[best] : cpi_ref;
        }

        function deflator(year) {
            // Multiply nominal value by this to get real value in cpi_ref_year terms
            const c = get_cpi(year);
            return (c && cpi_ref) ? cpi_ref / c : 1;
        }

        function fetch_cpi_data() {
            const apiUrl = "https://data.gov.sg/api/action/datastore_search?resource_id=d_bdaff844e3ef89d39fceb962ff8f0791";
            const corsProxy = "https://corsproxy.io/?";
            return fetch(corsProxy + encodeURIComponent(apiUrl))
                .then(r => { if (!r.ok) throw new Error('network'); return r.json(); })
                .catch(() => fetch('cached_consumer_price_index.json').then(r => r.json()))
                .then(data => {
                    cpi_data = parse_cpi_data(data);
                    const years = Object.keys(cpi_data).map(Number);
                    cpi_ref_year = Math.max(...years);
                    cpi_ref = cpi_data[cpi_ref_year];
                })
                .catch(err => console.error('Error fetching CPI data:', err));
        }

        // ── Household data ───────────────────────────────────────────────────

        function parse_households_data(incoming_data) {
            const records = incoming_data.result.records;
            let householdsRow = null, avgSizeRow = null;
            for (const r of records) {
                const s = r['DataSeries'].trim();
                if (s === 'Resident Households') householdsRow = r;
                if (s === 'Average Household Size Among Resident Households') avgSizeRow = r;
            }
            if (!householdsRow || !avgSizeRow) return {};
            const result = {};
            for (const [key, value] of Object.entries(householdsRow)) {
                if (key !== '_id' && key !== 'DataSeries') {
                    const year = parseInt(key);
                    if (!isNaN(year)) {
                        result[year] = {
                            households: parseFloat(value),
                            avgSize: parseFloat(avgSizeRow[key]) || null
                        };
                    }
                }
            }
            return result;
        }

        function get_household_info(year) {
            const years = Object.keys(households_data).map(Number).sort((a, b) => a - b);
            let best = null;
            for (const y of years) { if (y <= year) best = y; }
            if (best === null && years.length > 0) best = years[0];
            return best !== null ? { year: best, ...households_data[best] } : null;
        }

        function fetch_households_data() {
            const apiUrl = "https://data.gov.sg/api/action/datastore_search?resource_id=d_2bc812dbfd1e485638435fcdf7aac196";
            const corsProxy = "https://corsproxy.io/?";
            return fetch(corsProxy + encodeURIComponent(apiUrl))
                .then(r => { if (!r.ok) throw new Error('network'); return r.json(); })
                .catch(() => fetch('cached_households.json').then(r => r.json()))
                .then(data => { households_data = parse_households_data(data); })
                .catch(err => console.error('Error fetching households data:', err));
        }

        // ── Balance sheet data ───────────────────────────────────────────────

        function parse_data(incoming_data) {
            const records = incoming_data.result.records;
            const result = {};
            for (const record of records) {
                const series = record['DataSeries'].trim();
                for (const [key, value] of Object.entries(record)) {
                    if (key !== '_id' && key !== 'DataSeries') {
                        if (!(key in result)) result[key] = {};
                        result[key][series] = parseFloat(value);
                    }
                }
            }
            return result;
        }

        function fetch_and_parse_data() {
            const apiUrl = "https://data.gov.sg/api/action/datastore_search?resource_id=d_c14a14d2f870e909268a9be5970e7d87";
            const corsProxy = "https://corsproxy.io/?";
            return fetch(corsProxy + encodeURIComponent(apiUrl))
                .then(r => { if (!r.ok) throw new Error('network'); return r.json(); })
                .catch(() => fetch('cached_household_sector_balance.json').then(r => r.json()))
                .then(data => {
                    all_data = parse_data(data);
                    refresh_controls();
                })
                .catch(err => console.error('Error fetching balance sheet data:', err));
        }

        // ── Controls ─────────────────────────────────────────────────────────

        function refresh_controls() {
            all_quarters = Object.keys(all_data).sort();
            const slider = document.getElementById('quarterSlider');
            slider.max = all_quarters.length - 1;
            slider.value = all_quarters.length - 1;
            if (all_quarters.length > 0) {
                document.getElementById('quarterLabel').textContent = formatQuarter(all_quarters[all_quarters.length - 1]);
                plot_sankey();
            }
        }

        function plot_sankey_from_slider() {
            const i = parseInt(document.getElementById('quarterSlider').value);
            document.getElementById('quarterLabel').textContent = formatQuarter(all_quarters[i]);
            plot_sankey();
            update_trend_line();
        }

        // ── Trend chart ───────────────────────────────────────────────────────

        function build_trend_data() {
            const years = [], hh = [], perHH_real = [], perPerson_real = [], cpi_arr = [];

            for (let year = 1995; year <= 2026; year++) {
                const qs = all_quarters.filter(q => q.startsWith(String(year)));
                if (qs.length === 0) continue;
                const nwM = all_data[qs[qs.length - 1]]?.["Household Net Worth"];
                if (!nwM) continue;

                const hhInfo = get_household_info(year);
                if (!hhInfo?.households || !hhInfo?.avgSize) continue;

                const d = deflator(year);
                years.push(year);
                hh.push(hhInfo.households);
                perHH_real.push((nwM * 1e6) / hhInfo.households * d);
                perPerson_real.push((nwM * 1e6) / (hhInfo.households * hhInfo.avgSize) * d);
                cpi_arr.push(get_cpi(year));
            }

            return { years, hh, perHH_real, perPerson_real, cpi_arr };
        }

        function plot_stats_trend() {
            const td = build_trend_data();
            if (td.years.length === 0) return;

            // Index so the last point = 100
            function idxLast(arr) {
                const last = arr[arr.length - 1];
                return arr.map(v => +(v / last * 100).toFixed(1));
            }

            const refLabel = cpi_ref_year ? ` (real ${cpi_ref_year})` : '';

            const traces = [
                { name: 'Resident Households',   y: idxLast(td.hh),           color: '#10b981', dash: 'dot' },
                { name: `Per HH${refLabel}`,     y: idxLast(td.perHH_real),    color: '#3b82f6' },
                { name: `Per Person${refLabel}`, y: idxLast(td.perPerson_real), color: '#f59e0b' },
                { name: 'CPI (All Items)',        y: idxLast(td.cpi_arr),        color: '#ef4444', dash: 'dash' },
            ].map(t => ({
                x: td.years, y: t.y, name: t.name,
                type: 'scatter', mode: 'lines',
                line: { color: t.color, width: 1.5, dash: t.dash || 'solid' },
                hovertemplate: `%{x}: %{y:.0f}<extra>${t.name}</extra>`
            }));

            Plotly.newPlot('statsChart', traces, {
                margin: { l: 28, r: 4, t: 22, b: 52 },
                title: { text: 'Trend (latest = 100)', font: { size: 10 }, y: 0.98 },
                xaxis: { tickfont: { size: 8 }, nticks: 6 },
                yaxis: { tickfont: { size: 8 } },
                legend: { font: { size: 8 }, orientation: 'h', x: 0, y: -0.18 },
                showlegend: true,
                plot_bgcolor: 'white',
                paper_bgcolor: 'white'
            }, { responsive: true, displayModeBar: false })
                .then(() => update_trend_line());
        }

        function update_trend_line() {
            const i = parseInt(document.getElementById('quarterSlider').value);
            const quarter = all_quarters[i];
            if (!quarter) return;
            const year = parseInt(quarter.substring(0, 4));
            Plotly.relayout('statsChart', {
                shapes: [{
                    type: 'line',
                    x0: year, x1: year,
                    y0: 0, y1: 1,
                    xref: 'x', yref: 'paper',
                    line: { color: '#6b7280', width: 1, dash: 'dash' }
                }]
            });
        }

        // ── Sankey ────────────────────────────────────────────────────────────

        function plot_sankey() {
            const i = parseInt(document.getElementById('quarterSlider').value);
            const quarter = all_quarters[i];
            if (!quarter || !all_data[quarter]) return;

            const rawData = all_data[quarter];
            const year = parseInt(quarter.substring(0, 4));
            const hhInfo = get_household_info(year);
            const households = hhInfo?.households ?? null;
            const avgSize   = hhInfo?.avgSize   ?? null;
            const dataYear  = hhInfo?.year       ?? null;
            const population = (households && avgSize) ? households * avgSize : null;
            const totalNWM = rawData["Household Net Worth"] || 0;
            const d = deflator(year);

            // Update current stats block
            const nomPerHH   = (households && totalNWM) ? formatDollars((totalNWM * 1e6) / households) : '—';
            const nomPerPsn  = (population && totalNWM) ? formatDollars((totalNWM * 1e6) / population) : '—';
            const realPerHH  = (households && totalNWM) ? formatDollars((totalNWM * 1e6) / households * d) : '—';
            const realPerPsn = (population && totalNWM) ? formatDollars((totalNWM * 1e6) / population * d) : '—';
            const cpiYear    = get_cpi(year);
            const cpiStr     = cpiYear ? cpiYear.toFixed(1) : '—';
            const cpiRefStr  = cpi_ref ? cpi_ref.toFixed(1) : '—';
            const cpiNote    = cpi_ref_year ? `CPI ${year}: ${cpiStr} → ${cpi_ref_year}: ${cpiRefStr}` : '—';

            document.getElementById('currentStats').innerHTML = `
                <div class="grid grid-cols-2 gap-x-3 gap-y-1">
                    <div>
                        <div class="text-gray-400 uppercase tracking-wide" style="font-size:9px;">Nat. Household Balance</div>
                        <div class="font-semibold text-gray-800 text-sm">${totalNWM ? formatMillion(totalNWM) : '—'}</div>
                    </div>
                    <div>
                        <div class="text-gray-400 uppercase tracking-wide" style="font-size:9px;">Resident Households</div>
                        <div class="font-semibold text-gray-800 text-sm">${households ? households.toLocaleString('en-SG') : '—'}</div>
                    </div>
                    <div>
                        <div class="text-gray-400 uppercase tracking-wide" style="font-size:9px;">Avg HH Size${dataYear ? ` (${dataYear})` : ''}</div>
                        <div class="font-semibold text-gray-800 text-sm">${avgSize ? avgSize.toFixed(2) + ' pax' : '—'}</div>
                    </div>
                    <div>
                        <div class="text-gray-400 uppercase tracking-wide" style="font-size:9px;">${cpiNote}</div>
                        <div class="font-semibold text-gray-800 text-sm">×${d.toFixed(3)} deflator</div>
                    </div>
                    <div>
                        <div class="text-gray-400 uppercase tracking-wide" style="font-size:9px;">Balance / HH (nominal)</div>
                        <div class="font-semibold text-gray-800 text-sm">${nomPerHH}</div>
                    </div>
                    <div>
                        <div class="text-gray-400 uppercase tracking-wide" style="font-size:9px;">Balance / HH (real ${cpi_ref_year || ''})</div>
                        <div class="font-semibold text-gray-800 text-sm">${realPerHH}</div>
                    </div>
                    <div>
                        <div class="text-gray-400 uppercase tracking-wide" style="font-size:9px;">Balance / Person (nominal)</div>
                        <div class="font-semibold text-gray-800 text-sm">${nomPerPsn}</div>
                    </div>
                    <div>
                        <div class="text-gray-400 uppercase tracking-wide" style="font-size:9px;">Balance / Person (real ${cpi_ref_year || ''})</div>
                        <div class="font-semibold text-gray-800 text-sm">${realPerPsn}</div>
                    </div>
                </div>`;

            // Scale values for Sankey based on selected mode
            const mode = document.querySelector('input[name="sankeyMode"]:checked')?.value ?? 'person';
            const divisor = mode === 'household' ? households : population;
            function scaleReal(valueM) {
                if (!divisor || !valueM) return 0;
                return (valueM * 1e6) / divisor * d;
            }
            const data = {};
            for (const [k, v] of Object.entries(rawData)) data[k] = scaleReal(v);

            const labels = [
                "Liabilities", "Mortgage Loans", "Personal Loans",
                "Financial Institutions", "Housing & Development Board (HDB)",
                "Credit/Charge Cards", "Motor Vehicle", "Others",
                "Household Net Worth", "Assets", "Financial Assets",
                "Residential Property Assets", "Currency & Deposits",
                "Shares & Securities", "Life Insurance",
                "Central Provident Fund (CPF)", "Pension Funds",
                "Private Housing", "Public Housing",
                "Listed Shares", "Unlisted Shares", "Unit Trusts & Investment Funds"
            ];

            const sources = [], targets = [], values = [];
            function addLink(src, tgt, val) {
                if (val > 0) {
                    const si = labels.indexOf(src), ti = labels.indexOf(tgt);
                    if (si !== -1 && ti !== -1) { sources.push(si); targets.push(ti); values.push(val); }
                }
            }

            addLink("Financial Institutions",           "Mortgage Loans",               data["Financial Institutions"] || 0);
            addLink("Housing & Development Board (HDB)","Mortgage Loans",               data["Housing & Development Board (HDB)"] || 0);
            addLink("Credit/Charge Cards",              "Personal Loans",               data["Credit/Charge Cards"] || 0);
            addLink("Motor Vehicle",                    "Personal Loans",               data["Motor Vehicle"] || 0);
            addLink("Others",                           "Personal Loans",               data["Others"] || 0);
            addLink("Mortgage Loans",                   "Liabilities",                  data["Mortgage Loans"] || 0);
            addLink("Personal Loans",                   "Liabilities",                  data["Personal Loans"] || 0);
            addLink("Liabilities",                      "Assets",                       data["Liabilities"] || 0);
            addLink("Household Net Worth",              "Assets",                       data["Household Net Worth"] || 0);
            addLink("Assets",                           "Financial Assets",             data["Financial Assets"] || 0);
            addLink("Assets",                           "Residential Property Assets",  data["Residential Property Assets"] || 0);
            addLink("Financial Assets",                 "Currency & Deposits",          data["Currency & Deposits"] || 0);
            addLink("Financial Assets",                 "Shares & Securities",          data["Shares & Securities"] || 0);
            addLink("Financial Assets",                 "Life Insurance",               data["Life Insurance"] || 0);
            addLink("Financial Assets",                 "Central Provident Fund (CPF)", data["Central Provident Fund (CPF)"] || 0);
            addLink("Financial Assets",                 "Pension Funds",                data["Pension Funds"] || 0);
            addLink("Shares & Securities",              "Listed Shares",                data["Listed Shares"] || 0);
            addLink("Shares & Securities",              "Unlisted Shares",              data["Unlisted Shares"] || 0);
            addLink("Shares & Securities",              "Unit Trusts & Investment Funds", data["Unit Trusts & Investment Funds"] || 0);
            addLink("Residential Property Assets",      "Private Housing",              data["Private Housing"] || 0);
            addLink("Residential Property Assets",      "Public Housing",               data["Public Housing"] || 0);

            current_labels = labels;

            const isLiabilityLabel = l =>
                l.includes("Liabilities") || l.includes("Loans") || l.includes("Cards") ||
                l === "Motor Vehicle" || l === "Others" || l.includes("Financial Institutions") ||
                l.includes("Housing & Development Board");

            const realSuffix = cpi_ref_year ? ` · real ${cpi_ref_year} SGD` : '';
            const modeLabel = mode === 'household' ? 'Per household' : 'Per person';
            const modeCount = mode === 'household'
                ? (households ? `${(households / 1e3).toFixed(0)}k households` : '')
                : (population ? `${(population / 1e6).toFixed(2)}M residents` : '');
            const perPersonNote = `${modeLabel}${realSuffix}${modeCount ? ` · ${modeCount}` : ''}`;

            const plotData = [{
                type: "sankey", orientation: "h",
                textfont: { size: 14, color: "black", family: "Arial, sans-serif" },
                node: {
                    pad: 15, thickness: 20,
                    line: { color: "black", width: 0.5 },
                    label: labels,
                    color: labels.map(l =>
                        l === "Household Net Worth" ? "#6b7280"
                            : isLiabilityLabel(l) ? "#ef4444" : "#3b82f6"),
                    customdata: labels.map(l => formatDollars(data[l] || 0)),
                    hovertemplate: `%{label}<br />%{customdata} / ${mode === 'household' ? 'household' : 'person'}<extra></extra>`
                },
                link: {
                    source: sources, target: targets, value: values,
                    customdata: values.map(v => formatDollars(v)),
                    hovertemplate: `%{customdata} / ${mode === 'household' ? 'household' : 'person'}<extra></extra>`
                }
            }];

            const layout = {
                title: `Singapore Household Sector Balance Sheet 🇸🇬<br><span style="font-size:13px;">${formatQuarter(quarter)} — ${perPersonNote}</span>`,
                font: { size: 14 },
                margin: { l: 20, r: 20, t: 50, b: 20 },
                transition: { duration: 0 }
            };

            const plotDiv = document.getElementById('sankeyPlot');
            Plotly.newPlot(plotDiv, plotData, layout, { responsive: true })
                .then(() => {
                    plotDiv.on('plotly_hover', function(eventData) {
                        const point = eventData.points[0];
                        if (point.pointNumber !== undefined && point.label && !point.source) {
                            if (point.label === "Household Net Worth" || point.label === "Assets") { hidePieChart(); return; }
                            showPieChart(point.label, data[point.label] || 0, data["Household Net Worth"] || 1);
                        } else if (point.source && point.target) {
                            const src = point.source.label, tgt = point.target.label;
                            if (src === "Household Net Worth" && tgt === "Assets") { hidePieChart(); return; }
                            const liabilityNodes = ["Liabilities","Mortgage Loans","Personal Loans","Household Net Worth","Assets"];
                            showPieChart(liabilityNodes.includes(tgt) ? src : tgt, point.value || 0, data["Household Net Worth"] || 1);
                        } else {
                            hidePieChart();
                        }
                    });
                    plotDiv.on('plotly_unhover', hidePieChart);
                })
                .catch(err => console.error("Error creating plot:", err));
        }

        // ── Pie chart ─────────────────────────────────────────────────────────

        function showPieChart(label, value, netWorth) {
            const pct = (value / netWorth * 100).toFixed(1);
            const isLiability = label.includes("Liabilities") || label.includes("Loans") ||
                label.includes("Cards") || label === "Motor Vehicle" || label === "Others" ||
                label.includes("Financial Institutions") || label.includes("Housing & Development Board");

            Plotly.react('pieChart', [{
                values: [value, netWorth - value],
                labels: [label, 'Other'],
                type: 'pie', hole: 0.5,
                marker: { colors: [isLiability ? '#ef4444' : '#3b82f6', '#e5e7eb'] },
                textposition: 'none', hoverinfo: 'label+percent', sort: false
            }], {
                title: {
                    text: `${pct}%<br><span style="font-size:11px;">${label}<br>(vs net worth)</span>`,
                    font: { size: 14 }
                },
                showlegend: false,
                margin: { l: 10, r: 10, t: 55, b: 10 },
                font: { size: 13 }
            }, { responsive: true });
        }

        function hidePieChart() { Plotly.purge('pieChart'); }

        // ── Init ──────────────────────────────────────────────────────────────

        window.onload = function() {
            Promise.all([fetch_and_parse_data(), fetch_households_data(), fetch_cpi_data()])
                .then(() => {
                    if (all_quarters.length > 0) {
                        plot_sankey();
                        plot_stats_trend();
                    }
                });
        };
    </script>
</body>
</html>
