<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household Sector Balance Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col p-4 items-center">
    <div class="flex-1 flex flex-col min-h-0 items-center w-full">
        <div class="bg-white rounded-lg shadow-sm p-4 mb-4 mx-auto" style="max-width: 1500px; width: 100%;">
            <div class="flex items-center gap-4">
                <label for="quarterSlider" class="text-sm font-medium text-gray-700 whitespace-nowrap">Quarter:</label>
                <input type="range" id="quarterSlider" min="0" max="0" value="0" 
                    oninput="plot_sankey_from_slider()" 
                    class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                <span id="quarterLabel" class="text-sm font-medium text-gray-700 min-w-[80px] text-right">Loading...</span>
            </div>
        </div>
        
        <div class="flex gap-4 flex-1 min-h-0 mx-auto" style="max-width: 1500px; max-height: 800px; width: 100%;">
            <div class="bg-white rounded-lg shadow-sm p-4" style="width: 80%;">
                <div id="sankeyPlot" class="w-full h-full"></div>
            </div>
            <div class="bg-white rounded-lg shadow-sm p-4" style="width: 20%;">
                <div id="pieChart" class="w-full h-full"></div>
            </div>
        </div>
        
        <div class="mt-3 text-xs text-gray-500 text-center" style="max-width: 1500px; width: 100%;">
            Data source: <a href="https://data.gov.sg/datasets/d_c14a14d2f870e909268a9be5970e7d87/view" target="_blank" class="text-blue-600 hover:underline">data.gov.sg</a>
        </div>
    </div>

    <script>
        var all_data = {}; // Global variable to hold parsed data, e.g {'20253Q': {'Shares & Securities': 12345, ...}, ...}
        var all_quarters = []; // Array of quarter keys sorted
        var current_labels = []; // Current node labels for pie chart

        function formatQuarter(quarterStr) {
            // Convert "20251Q" to "2025 Q1"
            const year = quarterStr.substring(0, 4);
            const quarter = quarterStr.substring(4).replace('Q', '');
            return `${year} Q${quarter}`;
        }

        function refresh_controls() {
            // Populate slider with available quarters
            all_quarters = Object.keys(all_data).sort(); // Sort ascending: earliest to latest
            
            const quarterSlider = document.getElementById('quarterSlider');
            quarterSlider.max = all_quarters.length - 1;
            quarterSlider.value = all_quarters.length - 1; // Set to latest quarter (right side)
            
            // Auto-select latest quarter and plot
            if (all_quarters.length > 0) {
                document.getElementById('quarterLabel').textContent = formatQuarter(all_quarters[all_quarters.length - 1]);
                plot_sankey();
            }
        }
        
        function plot_sankey_from_slider() {
            const sliderValue = parseInt(document.getElementById('quarterSlider').value);
            const quarter = all_quarters[sliderValue];
            document.getElementById('quarterLabel').textContent = formatQuarter(quarter);
            plot_sankey();
        }
        
        function plot_sankey() {
            const sliderValue = parseInt(document.getElementById('quarterSlider').value);
            const quarter = all_quarters[sliderValue];
            if (!quarter || !all_data[quarter]) return;
            
            const data = all_data[quarter];
            console.log('Plotting Sankey for quarter:', quarter, data);
            
            // Define all nodes in order (left to right by column)
            const labels = [
                // Column 1: Liabilities
                "Liabilities",
                // Column 2: Liability types
                "Mortgage Loans",
                "Personal Loans",
                // Column 3: Detailed liabilities
                "Financial Institutions",
                "Housing & Development Board (HDB)",
                "Credit/Charge Cards",
                "Motor Vehicle",
                "Others",
                // Column 4: Net Worth (center)
                "Household Net Worth",
                // Column 5: Assets
                "Assets",
                // Column 6: Asset types
                "Financial Assets",
                "Residential Property Assets",
                // Column 7: Detailed Financial Assets & Property
                "Currency & Deposits",
                "Shares & Securities",
                "Life Insurance",
                "Central Provident Fund (CPF)",
                "Pension Funds",
                "Private Housing",
                "Public Housing",
                // Column 8: Shares breakdown
                "Listed Shares",
                "Unlisted Shares",
                "Unit Trusts & Investment Funds"
            ];
            
            // Build links (source -> target with values)
            const sources = [];
            const targets = [];
            const values = [];
            
            function addLink(sourceLabel, targetLabel, value) {
                if (value && value > 0) {
                    const sourceIdx = labels.indexOf(sourceLabel);
                    const targetIdx = labels.indexOf(targetLabel);
                    if (sourceIdx !== -1 && targetIdx !== -1) {
                        sources.push(sourceIdx);
                        targets.push(targetIdx);
                        values.push(value);
                    }
                }
            }
            
            // Liabilities breakdown
            addLink("Financial Institutions", "Mortgage Loans", data["Financial Institutions"] || 0);
            addLink("Housing & Development Board (HDB)", "Mortgage Loans", data["Housing & Development Board (HDB)"] || 0);
            addLink("Credit/Charge Cards", "Personal Loans", data["Credit/Charge Cards"] || 0);
            addLink("Motor Vehicle", "Personal Loans", data["Motor Vehicle"] || 0);
            addLink("Others", "Personal Loans", data["Others"] || 0);
            
            addLink("Mortgage Loans", "Liabilities", data["Mortgage Loans"] || 0);
            addLink("Personal Loans", "Liabilities", data["Personal Loans"] || 0);
            
            // Both Liabilities and Net Worth link to Assets
            addLink("Liabilities", "Assets", data["Liabilities"] || 0);
            addLink("Household Net Worth", "Assets", data["Household Net Worth"] || 0);
            
            // Assets breakdown
            addLink("Assets", "Financial Assets", data["Financial Assets"] || 0);
            addLink("Assets", "Residential Property Assets", data["Residential Property Assets"] || 0);
            
            // Financial Assets breakdown
            addLink("Financial Assets", "Currency & Deposits", data["Currency & Deposits"] || 0);
            addLink("Financial Assets", "Shares & Securities", data["Shares & Securities"] || 0);
            addLink("Financial Assets", "Life Insurance", data["Life Insurance"] || 0);
            addLink("Financial Assets", "Central Provident Fund (CPF)", data["Central Provident Fund (CPF)"] || 0);
            addLink("Financial Assets", "Pension Funds", data["Pension Funds"] || 0);
            
            // Shares & Securities breakdown
            addLink("Shares & Securities", "Listed Shares", data["Listed Shares"] || 0);
            addLink("Shares & Securities", "Unlisted Shares", data["Unlisted Shares"] || 0);
            addLink("Shares & Securities", "Unit Trusts & Investment Funds", data["Unit Trusts & Investment Funds"] || 0);
            
            // Residential Property breakdown
            addLink("Residential Property Assets", "Private Housing", data["Private Housing"] || 0);
            addLink("Residential Property Assets", "Public Housing", data["Public Housing"] || 0);
            
            console.log('Links created:', sources.length);
            
            // Store labels globally for hover events
            current_labels = labels;
            
            // Create Plotly Sankey diagram
            const plotData = [{
                type: "sankey",
                orientation: "h",
                textfont: {
                    size: 14,
                    color: "black",
                    family: "Arial, sans-serif"
                },
                node: {
                    pad: 15,
                    thickness: 20,
                    line: { color: "black", width: 0.5 },
                    label: labels,
                    color: labels.map(label => {
                        if (label === "Household Net Worth") return "#6b7280";
                        if (label.includes("Assets") || label === "Assets") return "#3b82f6";
                        if (label.includes("Liabilities") || label.includes("Loans") || 
                            label.includes("Cards") || label === "Motor Vehicle" || 
                            label === "Others" || label.includes("Financial Institutions") ||
                            label.includes("HDB") || label.includes("Housing & Development Board")) return "#ef4444";
                        return "#3b82f6";
                    }),
                    hovertemplate: '%{label}<extra></extra>'
                ,
                                    customdata: labels.map((label, idx) => {
                                        // Get value for this node by fetching from the all_data
                                        return data[label] || 0;
                                    }),
                                    hovertemplate: '%{label}<br />$%{customdata:,.0f}M<extra></extra>'
                },
                link: {
                    source: sources,
                    target: targets,
                    value: values,
                    hovertemplate: '%{source.label}<br />$%{value:,.0f}M<extra></extra>',
                    customdata: sources.map((sourceIdx, i) => {
                        const sourceLabel = labels[sourceIdx];
                        const targetLabel = labels[targets[i]];
                        // Determine if this is a liability (source) or asset (target) flow
                        const isLiability = sourceLabel.includes("Liabilities") || sourceLabel.includes("Loans") || 
                            sourceLabel.includes("Cards") || sourceLabel === "Motor Vehicle" || 
                            sourceLabel === "Others" || sourceLabel.includes("Financial Institutions") ||
                            sourceLabel.includes("HDB") || sourceLabel.includes("Housing & Development Board");
                        return isLiability ? sourceLabel : targetLabel;
                    }),
                    hovertemplate: '%{customdata}<br />$%{value:,.0f}M<extra></extra>'
                }
            }];
            
            const layout = {
                title: `Singapore Household Sector Balance Sheet 🇸🇬<br>${formatQuarter(quarter)}`,
                font: { size: 14 },
                margin: { l: 20, r: 20, t: 40, b: 20 },
                transition: {
                    duration: 0
                }
            };
            
            console.log("Calling Plotly.newPlot...");
            const plotDiv = document.getElementById('sankeyPlot');
            Plotly.newPlot(plotDiv, plotData, layout, {responsive: true})
                .then(() => {
                    console.log("Sankey plot created successfully!");
                    // Add hover events for pie chart
                    plotDiv.on('plotly_hover', function(eventData) {
                        const point = eventData.points[0];
                        
                        // Handle nodes
                        if (point.pointNumber !== undefined && point.label && !point.source) {
                            const label = point.label;
                            // Skip Net Worth, Assets, and high-level categories
                            if (label === "Household Net Worth" || label === "Assets") {
                                hidePieChart();
                                return;
                            }
                            const value = data[label] || 0;
                            const netWorth = data["Household Net Worth"] || 1;
                            const percentage = (value / netWorth * 100).toFixed(1);
                            showPieChart(label, value, netWorth, percentage);
                        }
                        // Handle links
                        else if (point.source && point.target) {
                            const sourceLabel = point.source.label;
                            const targetLabel = point.target.label;
                            const value = point.value || 0;
                            const netWorth = data["Household Net Worth"] || 1;
                            const percentage = (value / netWorth * 100).toFixed(1);
                            
                            // For liability flows (target is a liability category), use source
                            // For asset flows, use target
                            const liabilityNodes = ["Liabilities", "Mortgage Loans", "Personal Loans", "Household Net Worth","Assets"];
                            let displayLabel;
                            
                            if (sourceLabel === "Household Net Worth" && targetLabel === "Assets") {
                                                            hidePieChart();
                                                        } else if (liabilityNodes.includes(targetLabel)) {
                                                            displayLabel = sourceLabel; // Liability flow - show source
                                                        } else {
                                                            displayLabel = targetLabel; // Asset flow - show target
                                                        }
                                                        
                                                        if (sourceLabel !== "Household Net Worth" || targetLabel !== "Assets") {
                                                            showPieChart(displayLabel, value, netWorth, percentage);
                                                        }
                        } 
                        else {
                            hidePieChart();
                        }
                    });
                    plotDiv.on('plotly_unhover', function() {
                        hidePieChart();
                    });
                })
                .catch(err => console.error("Error creating plot:", err));
        }
        
        function showPieChart(label, value, netWorth, percentage) {
            const pieDiv = document.getElementById('pieChart');
            
            // Determine color based on whether it's an asset or liability
            let pieColor;
            if (label.includes("Liabilities") || label.includes("Loans") || 
                label.includes("Cards") || label === "Motor Vehicle" || 
                label === "Others" || label.includes("Financial Institutions") ||
                label.includes("HDB") || label.includes("Housing & Development Board")) {
                pieColor = '#ef4444'; // Red for liabilities
            } else {
                pieColor = '#3b82f6'; // Blue for assets
            }
            
            const pieData = [{
                values: [value, netWorth - value],
                labels: [label, 'Other'],
                type: 'pie',
                hole: 0.5,
                marker: {
                    colors: [pieColor, '#e5e7eb']
                },
                textposition: 'none',
                hoverinfo: 'label+percent',
                sort: false
            }];
            
            const pieLayout = {
                title: {
                    text: `${percentage}%<br><span style="font-size: 12px;">${label}<br>(relative to net worth)</span>`,
                    font: { size: 16 }
                },
                showlegend: false,
                margin: { l: 10, r: 10, t: 60, b: 10 },
                font: { size: 16 }
            };
            
            Plotly.react('pieChart', pieData, pieLayout, {responsive: true});
        }
        
        function hidePieChart() {
            Plotly.purge('pieChart');
        }

        function parse_data(incoming_data) {
            // Placeholder for data parsing logic
            records = incoming_data.result.records;
            var all_data = {}; // In format {'20253Q': {'Shares & Securities': 12345, ...}, ...}
            for (let i = 0; i < records.length; i++) {
                // Each record has _id which should be ignored, then DataSeries which is like "    Shares & Securities", with other keys being like "20253Q", "20252Q", etc.
                let record = records[i];
                let data_series = record['DataSeries'].trim();
                for (const [key, value] of Object.entries(record)) {
                    if (key !== '_id' && key !== 'DataSeries') {
                        if (!(key in all_data)) {
                            all_data[key] = {};
                        }
                        all_data[key][data_series] = parseFloat(value);
                    }
                }
            }
            return all_data;
        }
